# =============================================================================
# Release Pipeline — Publish to PyPI on version tags
# =============================================================================
# Triggers: Push tag matching v*.*.* (e.g., v0.1.0, v1.2.3)
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # Required for trusted PyPI publishing

jobs:
  # ===========================================================================
  # Job 1: Validate & Test
  # ===========================================================================
  validate:
    name: ✅ Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml]"

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import survey_toolkit; print(survey_toolkit.__version__)")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Version mismatch! Tag: $TAG_VERSION, Package: $PKG_VERSION"
            exit 1
          fi
          echo "✅ Versions match"

      - name: Run full test suite
        run: |
          pytest tests/ -v --timeout=300
        env:
          MPLBACKEND: Agg

  # ===========================================================================
  # Job 2: Build & Publish
  # ===========================================================================
  publish:
    name: 📦 Build & Publish to PyPI
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/survey-ml-toolkit/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      # Option A: Trusted Publishing (recommended)
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

      # Option B: Using API token (fallback)
      # - name: Publish to PyPI
      #   run: twine upload dist/*
      #   env:
      #     TWINE_USERNAME: __token__
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  # ===========================================================================
  # Job 3: GitHub Release
  # ===========================================================================
  github-release:
    name: 📝 Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
        continue-on-error: true

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Write to file for the release body
          echo "## What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "$CHANGELOG" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Installation" >> RELEASE_NOTES.md
          echo '```bash' >> RELEASE_NOTES.md
          echo "pip install survey-ml-toolkit==${GITHUB_REF#refs/tags/v}" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true

  # ===========================================================================
  # Job 4: Publish to Test PyPI (for pre-releases)
  # ===========================================================================
  test-publish:
    name: 🧪 Publish to Test PyPI
    needs: validate
    if: contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/survey-ml-toolkit/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true