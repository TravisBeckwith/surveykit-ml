# =============================================================================
# Documentation Build & Deploy
# =============================================================================

name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "survey_toolkit/**"
      - "notebooks/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    name: 📚 Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs,ml]"

      - name: Build Sphinx docs
        run: |
          cd docs
          make html
        continue-on-error: true

      - name: Build fallback docs (if Sphinx not configured)
        if: failure()
        run: |
          mkdir -p docs/_build/html
          cp README.md docs/_build/html/
          echo '<html><head><meta http-equiv="refresh" content="0;url=https://github.com/${{ github.repository }}"></head></html>' > docs/_build/html/index.html

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html/

  deploy-docs:
    name: 🚀 Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4